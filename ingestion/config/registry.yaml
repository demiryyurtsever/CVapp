# Source registry (dossier §3.1). One entry per firm-source.
# The scheduler dispatches each entry to the adapter matching its ats_type.
# For ats_type: greenhouse, `endpoint_or_url` is the company token used in
# boards-api.greenhouse.io/v1/boards/{company}/jobs.
# For ats_type: lever, `endpoint_or_url` is the company token used in
# api.lever.co/v0/postings/{company}?mode=json.
# For ats_type: workday, `endpoint_or_url` is the Workday tenant token and the
# extra per-tenant params (dc number, site, early-careers search/facet filter)
# live in `config` (§3.5; the config-not-subclass choice is the [OPEN] §8.2 call).
sources:
  - firm_name: Point72
    # Placeholder tier: Point72 is a multi-manager fund, not an IB BB/EB/MM/boutique;
    # it is used here as the reference live Greenhouse source. See docs/PROGRESS.md.
    firm_tier: MM
    ats_type: greenhouse
    endpoint_or_url: point72
    region_scope: global
    enabled: true
    polling_notes: "Daily. Public Greenhouse board, no auth. Use ?content=true for descriptions."
  - firm_name: Wealthfront
    # Placeholder tier: Wealthfront is a fintech wealth-management firm, not an IB
    # BB/EB/MM/boutique; it is the reference live Lever source (the company token
    # `wealthfront` resolves at api.lever.co). See docs/PROGRESS.md.
    firm_tier: boutique
    ats_type: lever
    endpoint_or_url: wealthfront
    region_scope: US
    enabled: true
    polling_notes: "Daily. Public Lever board, no auth. api.lever.co/v0/postings/{company}?mode=json."
  - firm_name: Barclays
    # FIRST real IB firm in the registry (a bulge bracket). Confirmed Workday tenant
    # from the Session 7 discovery table (docs/PROGRESS.md): barclays.wd3, external
    # career site External_Career_Site_Barclays.
    firm_tier: BB
    ats_type: workday
    endpoint_or_url: barclays
    region_scope: global
    enabled: true
    # Per-tenant Workday quirks live here, not in code (the [OPEN] §8.2 config choice).
    config:
      dc: wd3
      site: External_Career_Site_Barclays
      # Early-careers search filter. Workday free-text search is loose; "graduate"
      # is the most defensibly early-careers term on this site (it surfaces the
      # Graduate Programme postings). Tune to a job-family facet via `applied_facets`
      # if/when the facet ids are confirmed.
      search_text: graduate
    polling_notes: "Daily. Workday paginated POST + per-posting detail follow-up. tenant=barclays dc=wd3 site=External_Career_Site_Barclays."
  - firm_name: Citi
    # Second real IB BB. Confirmed Workday tenant from the Session 7 table; the early-
    # careers board is citi.wd5 with the site segment literally "2" (front-end
    # jobs.citi.com is Phenom over this Workday). Added in Session 9 (Part 2) for the
    # [OPEN] dedup-key region-grain revisit: UNLIKE Barclays' free-text "graduate"
    # capture, this site DOES surface a genuine multi-office early-careers programme
    # (Summer Analyst Program across Sydney/Melbourne/New York/Budapest/Tokyo/Dubai/
    # Mississauga/Manila). See ingestion/tests/fixtures/workday_citi_earlycareers.json.
    # DISABLED: captured as a fixture for the future revisit; not polled yet (rule 7).
    firm_tier: BB
    ats_type: workday
    endpoint_or_url: citi
    region_scope: global
    enabled: false
    config:
      dc: wd5
      site: "2"
      # Free-text early-careers filter. Citi exposes no dedicated early-careers facet
      # (its jobFamilyGroup "Management Development Programs" is BANAMEX retail-heavy),
      # so "Summer Analyst Program" is the cleanest signal that surfaces the genuine
      # multi-office analyst programme. Like any Workday free-text search it also
      # returns some lateral roles; the multi-office early-careers shape is present.
      search_text: "Summer Analyst Program"
    polling_notes: "DISABLED. Workday tenant=citi dc=wd5 site=2. Captured for the dedup-key region-grain revisit (Session 9 Part 2); enable when that session runs."
